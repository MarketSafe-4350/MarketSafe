<header class="top-header">
  <div class="header-left"></div>

  <div class="header-right">
    <button
      mat-icon-button
      class="notifications-btn"
      disableRipple
      aria-label="Notifications"
      [matMenuTriggerFor]="notificationsMenu"
      (menuOpened)="onNotificationsOpened()"
    >
      @if (unseenCount() > 0) {
        <span class="notification-badge">{{ unseenCount() > 9 ? '9+' : unseenCount() }}</span>
      }
      <mat-icon>notifications</mat-icon>
    </button>

    <mat-menu
      #notificationsMenu="matMenu"
      class="notifications-menu"
      xPosition="before"
    >
      <div class="notifications-panel" (click)="$event.stopPropagation()">
        <div class="notifications-panel-header">
          <div>
            <h3>Offers</h3>
            <p>Recent offers on your listings</p>
          </div>
          <button
            mat-button
            type="button"
            class="see-all-btn"
            (click)="goToOffersPage()"
          >
            See all
          </button>
        </div>

        @if (isLoadingOffers()) {
          <p class="notifications-status">Loading offers...</p>
        } @else if (offersError()) {
          <p class="notifications-status error">{{ offersError() }}</p>
        } @else if (offers().length === 0) {
          <p class="notifications-status">No offers yet.</p>
        } @else {
          <div class="notifications-list">
            @for (offer of offers(); track offer.id) {
              <button
                class="notification-item"
                type="button"
                [class.unseen]="!offer.seen"
                (click)="goToOffersPage()"
              >
                <div class="notification-copy">
                  <span class="notification-title">{{ offer.listingTitle }}</span>
                  <span class="notification-subtitle">
                    New offer for ${{ offer.offeredPrice.toFixed(2) }}
                  </span>
                </div>
                <span class="notification-time">{{ formatOfferDate(offer.createdDate) }}</span>
              </button>
            }
          </div>
        }
      </div>
    </mat-menu>

    <button
      mat-button
      class="user-profile-btn"
      type="button"
      (click)="goToProfile()"
      disableRipple
    >
      <span class="user-name">{{ displayName() }}</span>
    </button>

    <button
      mat-icon-button
      class="user-dropdown-btn"
      disableRipple
      [matMenuTriggerFor]="userMenu"
      aria-label="User menu"
      disableRipple
    >
      <mat-icon>expand_more</mat-icon>
    </button>

    <mat-menu #userMenu="matMenu">
      <button mat-menu-item (click)="onLogout()">
        <mat-icon>logout</mat-icon>
        <span>Logout</span>
      </button>
    </mat-menu>
  </div>
</header>
