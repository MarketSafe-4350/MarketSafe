services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: marketsafe
      MYSQL_USER: marketsafe
      MYSQL_PASSWORD: marketsafe
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 30

  db-init:
    build:
      context: ../assets/db
      dockerfile: init/Dockerfile
    environment:
      MYSQL_ROOT_PASSWORD: root
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: marketsafe
      DB_MODE: prod
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # ------------------------
  # MinIO
  # ------------------------
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # MinIO Console UI
    volumes:
      - minio_test_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 2s
      timeout: 2s
      retries: 30

  # Seeds bucket + uploads test images from repo folder
  minio-seed:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ../assets/default_pics:/seed-images:ro
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin123 &&
      mc mb -p local/media || true &&
      mc anonymous set none local/media || true &&
      mc mirror --overwrite /seed-images local/media &&
      echo 'MinIO seeded with test images.'
      "
    restart: "no"

volumes:
  minio_test_data: