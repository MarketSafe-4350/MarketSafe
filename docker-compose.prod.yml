services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: marketsafe
      MYSQL_USER: marketsafe
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-p${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 5s
      timeout: 3s
      retries: 30

  db-init:
    build:
      context: ./persistence/db
      dockerfile: init/Dockerfile
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: marketsafe
      DB_MODE: prod
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: prod
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: marketsafe
      DB_USER: marketsafe
      DB_PASSWORD: ${DB_PASSWORD}
      APP_ENV: prod
      SECRET_KEY: ${SECRET_KEY}
      FRONTEND_URL: ${FRONTEND_URL}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    depends_on:
      db-init:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
    ports:
      - "8090:80"
    depends_on:
      - api

volumes:
  mysql_data:
