name: CI

on:
  pull_request:
    branches: ["production", "main"]
  push:
    branches: ["production", "main"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test (Angular unit tests)
        run: npm test -- --watch=false --browsers=ChromeHeadless

      - name: Build
        run: npm run build -- --configuration=production

  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    env:
      APP_ENV: test
      SECRET_KEY: ci-test-secret-key
      FRONTEND_URL: http://localhost:4200
      CORS_ALLOWED_ORIGINS: http://localhost:4200
      DB_HOST: 127.0.0.1
      DB_PORT: "3307"
      DB_NAME: marketsafe
      DB_USER: marketsafe
      DB_PASSWORD: marketsafe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: server/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage

      # Quick syntax check
      - name: Compile check
        run: python -m compileall -q src

      - name: Run unit tests
        run: coverage run -m tests.unit.all_unit_tests

      - name: Generate coverage report unit tests (terminal)
        run: |
          coverage report -m

      - name: Run integration tests
        run: coverage run --append -m tests.integration.all_integration_tests

      - name: Generate coverage report unit + integration tests (terminal)
        run: |
          coverage report -m

      - name: Generate coverage report (HTML)
        run: |
          coverage html

      - name: Upload coverage HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-html
          path: server/htmlcov

      - name: Generate coverage report (XML)
        run: coverage xml

      - name: Upload coverage XML artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-xml
          path: server/coverage.xml

  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci] # wait for both CI jobs to pass before scanning

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full git history required for blame annotations and new code detection

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage-xml
          path: server # restores coverage.xml to server/ so SonarQube can find

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@3988e54db2467c7e9583a4af619c3f5647d6b8ad
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }} # authenticates with SonarQube
